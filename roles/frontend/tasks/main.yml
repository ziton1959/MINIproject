---
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Create web root
  file:
    path: /var/www/poc
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Deploy the UI
  template:
    src: index.html.j2
    dest: /var/www/poc/index.html
    owner: www-data
    group: www-data
    mode: '0644'

- name: Deploy nginx site config
  template:
    src: poc-site.conf.j2
    dest: /etc/nginx/sites-available/poc-site.conf
    mode: '0644'
  notify: restart nginx

- name: Enable the POC site
  file:
    src: /etc/nginx/sites-available/poc-site.conf
    dest: /etc/nginx/sites-enabled/poc-site.conf
    state: link
  notify: restart nginx

- name: Disable the default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Ensure nginx is running and enabled
  service:
    name: nginx
    state: started
    enabled: yes
